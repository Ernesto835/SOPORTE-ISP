# ==============================================================================
# CONFIGURACIÓN DEL CLÚSTER COCKROACHDB (3 NODOS) - ACC SOPORTE ISP
# ==============================================================================
version: '3.8'

networks:
  roach-net:
    driver: bridge

services:
  # ----------------------------------------------------------------------------
  # NODO 1: Administrador principal del clúster
  # ----------------------------------------------------------------------------
  crdb-node1:
    image: cockroachdb/cockroach:v24.3.0
    container_name: crdb-node1
    hostname: crdb-node1
    networks:
      - roach-net
    ports:
      - "26257:26257" # Puerto SQL externo
      - "8080:8080"   # Consola de administración (Web UI)
    volumes:
      - node1-data:/cockroach/cockroach-data
    command: start --insecure --join=crdb-node1,crdb-node2,crdb-node3 --advertise-addr=crdb-node1
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------------------
  # NODO 2: Nodo de redundancia y distribución de datos
  # ----------------------------------------------------------------------------
  crdb-node2:
    image: cockroachdb/cockroach:v24.3.0
    container_name: crdb-node2
    hostname: crdb-node2
    networks:
      - roach-net
    ports:
      - "26258:26257" # Mapeo SQL para acceso externo individual
      - "8081:8080"   # Consola alternativa
    volumes:
      - node2-data:/cockroach/cockroach-data
    command: start --insecure --join=crdb-node1,crdb-node2,crdb-node3 --advertise-addr=crdb-node2
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------------------
  # NODO 3: Nodo de redundancia y distribución de datos
  # ----------------------------------------------------------------------------
  crdb-node3:
    image: cockroachdb/cockroach:v24.3.0
    container_name: crdb-node3
    hostname: crdb-node3
    networks:
      - roach-net
    ports:
      - "26259:26257" # Mapeo SQL para acceso externo individual
      - "8082:8080"   # Consola alternativa
    volumes:
      - node3-data:/cockroach/cockroach-data
    command: start --insecure --join=crdb-node1,crdb-node2,crdb-node3 --advertise-addr=crdb-node3
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------------------
  # NODO ÚNICO: Instancia standalone para comparativa de rendimiento (benchmark)
  # ----------------------------------------------------------------------------
  cockroach-single:
    image: cockroachdb/cockroach:v24.3.0
    container_name: cockroach-single
    hostname: cockroach-single
    networks:
      - roach-net
    ports:
      - "26260:26257" # Puerto SQL para benchmark comparativo
      - "8083:8080"   # Consola Web UI del nodo único
    volumes:
      - single-data:/cockroach/cockroach-data
    command: start-single-node --insecure --advertise-addr=cockroach-single
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

# ------------------------------------------------------------------------------
# VOLÚMENES PERSISTENTES
# ------------------------------------------------------------------------------
volumes:
  node1-data:
  node2-data:
  node3-data:
  single-data:
